name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_NAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ✅ BACKEND FIX (IMPORTANT)
      - name: Build & Push Backend
        run: |
          docker build -t ${{ secrets.DOCKER_NAME }}/backend .
          docker push ${{ secrets.DOCKER_NAME }}/backend

      # ✅ FRONTEND (already correct)
      - name: Build & Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_NAME }}/frontend ./frontend
          docker push ${{ secrets.DOCKER_NAME }}/frontend

      # ✅ DEPLOY TO EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~
            docker-compose down
            docker pull ${{ secrets.DOCKER_NAME }}/backend
            docker pull ${{ secrets.DOCKER_NAME }}/frontend
            docker-compose up -d