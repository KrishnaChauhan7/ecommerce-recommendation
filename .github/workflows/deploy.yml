name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build & Push Backend
      run: |
        docker build -t krishnadocker4/backend ./backend
        docker push krishnadocker4/backend

    - name: Build & Push Frontend
      run: |
        docker build -t krishnadocker4/frontend ./frontend
        docker push krishnadocker4/frontend

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ~
          docker-compose down
          docker pull krishnadocker4/backend
          docker pull krishnadocker4/frontend
          docker-compose up -d
          